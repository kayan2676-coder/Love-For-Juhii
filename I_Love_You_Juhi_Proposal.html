
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Juhi ❤️</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff8fb1,#ffd6e7);
}
.heart{
position:fixed;
bottom:-30px;
font-size:20px;
animation:float 8s linear infinite;
opacity:.8;
}
@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}
.card{
text-align:center;
padding:30px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(8px);
border-radius:20px;
box-shadow:0 8px 30px rgba(0,0,0,.2);
}
h1{color:#fff;font-size:42px;margin-bottom:20px}
button{
padding:14px 34px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
}
#yes{background:#ff2d75;color:white}
#no{background:white;position:absolute}
#result{display:none;color:white}
#cat{font-size:90px;animation:bounce 1s infinite}
@keyframes bounce{50%{transform:translateY(-12px)}}
.confetti{
position:fixed;width:8px;height:8px;top:-10px;
animation:fall 3s linear forwards;
}
@keyframes fall{
to{transform:translateY(110vh) rotate(720deg)}
}
</style>
</head>
<body>
<div class="card">
<h1 id="title"></h1>
<button id="yes">Yes 💖</button>
<button id="no">No 🙈</button>
<div id="result">
<div id="cat">🐱💖</div>
<h1>I Love You Juhi ❤️</h1>
<h2>Yay! Forever Together ✨</h2>
</div>
</div>
<script>
const text="I Love You Juhi ❤️";
let i=0;
function type(){
 if(i<text.length){
  document.getElementById('title').textContent+=text.charAt(i++);
  setTimeout(type,90);
 }
}
type();

for(let j=0;j<35;j++){
 let h=document.createElement('div');
 h.className='heart';
 h.innerHTML='💖';
 h.style.left=Math.random()*100+'vw';
 h.style.animationDelay=(Math.random()*8)+'s';
 h.style.fontSize=(16+Math.random()*24)+'px';
 document.body.appendChild(h);
}
const no=document.getElementById('no');
function move(){
 no.style.left=Math.random()*(window.innerWidth-120)+'px';
 no.style.top=Math.random()*(window.innerHeight-70)+'px';
}
no.addEventListener('mouseover',move);
no.addEventListener('click',move);

document.getElementById('yes').onclick=()=>{
 document.getElementById('title').style.display='none';
 document.getElementById('yes').style.display='none';
 document.getElementById('no').style.display='none';
 document.getElementById('result').style.display='block';
 for(let k=0;k<120;k++){
  let c=document.createElement('div');
  c.className='confetti';
  c.style.left=Math.random()*100+'vw';
  c.style.background='hsl('+Math.random()*360+',100%,60%)';
  c.style.animationDelay=(Math.random())+'s';
  document.body.appendChild(c);
 }
}
</script>
</body>
</html>
